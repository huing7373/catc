name: PetApp

options:
  bundleIdPrefix: com.zhuming.pet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  PetApp:
    type: application
    platform: iOS
    sources:
      - PetApp
    dependencies:
      - sdk: HealthKit.framework  # Story 8.1 新增（节点 3 阶段 Health 接入）
      - sdk: CoreMotion.framework  # Story 8.2 新增（节点 3 阶段 Motion 接入）
    info:
      path: PetApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: PetApp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Story 2.5 review fix round 1：默认 baseURL 由 AppContainer 从此 key 读取，
        # 缺失时 fallback 到 http://localhost:8080。真机联调请通过 xcconfig 覆盖。
        # 详见 docs/lessons/2026-04-26-baseurl-from-info-plist.md
        PetAppBaseURL: http://localhost:8080
        # Story 2.5 review fix round 3：iOS ATS 默认拒 cleartext HTTP；
        # 用 NSAllowsLocalNetworking 例外允许 localhost / .local / 私有 IP，
        # 不允许公网 cleartext，比 NSAllowsArbitraryLoads 安全。
        # 详见 docs/lessons/2026-04-26-ios-ats-cleartext-http.md
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Story 8.1：HealthKit 步数读取权限弹窗的描述文案（系统首次申请时展示给用户）.
        # iOS 必填；缺失会让 requestAuthorization 直接抛错（HKError.errorAuthorizationNotDetermined）.
        NSHealthShareUsageDescription: "PetApp 读取你的步数，让小猫和你一起活动。"
        # Story 8.1 AC7：DEBUG-only 集成测试 HealthKitDevSeedUseCase 通过 HKHealthStore.save
        # 写入步数 sample；调 requestAuthorization(toShare:) 必须配 NSHealthUpdateUsageDescription
        # 否则系统直接 crash（即使 simulator 也会抛 NSInvalidArgumentException）.
        # 写入路径仅 #if DEBUG 编译，但 Info.plist key 是 build-time 全局配置——保留即可.
        NSHealthUpdateUsageDescription: "PetApp 在测试模式下预置步数到 HealthKit。"
        # Story 8.2: CoreMotion 运动状态识别权限弹窗的描述文案（系统首次申请时展示给用户）.
        # iOS 必填；缺失会让 startActivityUpdates / queryActivityStarting 直接抛错或被系统拒绝.
        NSMotionUsageDescription: "PetApp 识别你的运动状态，让小猫和你一起活动。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO

  PetAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PetAppTests
    dependencies:
      - target: PetApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app.tests
        GENERATE_INFOPLIST_FILE: YES

  PetAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PetAppUITests
      # 把 AccessibilityID 作为 UITest target 自己的 source 编译，
      # 避免在 UITest 中 @testable import PetApp（UI 测试以黑盒方式跑被测 App）。
      - path: PetApp/Shared/Constants/AccessibilityID.swift
    dependencies:
      - target: PetApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app.uitests
        GENERATE_INFOPLIST_FILE: YES
