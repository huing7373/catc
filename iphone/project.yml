name: PetApp

options:
  bundleIdPrefix: com.zhuming.pet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  PetApp:
    type: application
    platform: iOS
    sources:
      - PetApp
    info:
      path: PetApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: PetApp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Story 2.5 review fix round 1：默认 baseURL 由 AppContainer 从此 key 读取，
        # 缺失时 fallback 到 http://localhost:8080。真机联调请通过 xcconfig 覆盖。
        # 详见 docs/lessons/2026-04-26-baseurl-from-info-plist.md
        PetAppBaseURL: http://localhost:8080
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO

  PetAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PetAppTests
    dependencies:
      - target: PetApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app.tests
        GENERATE_INFOPLIST_FILE: YES

  PetAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PetAppUITests
      # 把 AccessibilityID 作为 UITest target 自己的 source 编译，
      # 避免在 UITest 中 @testable import PetApp（UI 测试以黑盒方式跑被测 App）。
      - path: PetApp/Shared/Constants/AccessibilityID.swift
    dependencies:
      - target: PetApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhuming.pet.app.uitests
        GENERATE_INFOPLIST_FILE: YES
