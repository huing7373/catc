services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: cat
      MONGO_INITDB_ROOT_PASSWORD: cat_dev_password
      MONGO_INITDB_DATABASE: cat
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass cat_redis_dev

volumes:
  mongodata:
