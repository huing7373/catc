version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: cat
      POSTGRES_PASSWORD: cat_dev_password
      POSTGRES_DB: cat_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass cat_redis_dev

volumes:
  pgdata:
