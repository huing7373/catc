server:
  # 本地开发默认绑 loopback：Windows Defender Firewall 对 127.0.0.1 免检，
  # 避免每次重编译 exe（新哈希）都弹一次"专用网络访问"授权窗。
  # 生产部署删掉此行（或改 0.0.0.0）让 server 监听所有网卡。
  bind_host: 127.0.0.1
  http_port: 8080
  read_timeout_sec: 5
  write_timeout_sec: 10

mysql:
  # 本地 MySQL 连接串（Story 4.2 接入，ADR-0003 选型）。
  # 生产 / staging 通过环境变量 `CAT_MYSQL_DSN` 覆盖（loader.go 已挂 env 优先级；
  # 部署 / K8s Secret 注入 DSN，避免把密码写进 ConfigMap / 仓库）。
  # 字段说明详见 _bmad-output/implementation-artifacts/decisions/0003-orm-stack.md §"DSN 配置策略"。
  dsn: "cat:catdev@tcp(127.0.0.1:3306)/cat?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_sec: 1800

auth:
  # JWT signing secret（HS256；Story 4.4 接入）。
  #
  # === DEV ONLY — production MUST override via CAT_AUTH_TOKEN_SECRET env ===
  # 这里填的是 **本地开发专用** 的语义化默认 secret（≥32 字节，明显 dev 用途）。
  # 目的：fresh clone 后 `./build/catserver -config server/configs/local.yaml`
  # 可以**直接跑起来**，不需要先 export env，降低本地 / iOS simulator 联调摩擦。
  # 由于本字符串显式标注 "do-not-use-in-prod"，被生产环境误用的成本很低
  # （任何 secret scanner 命中都会拦下；运维也会一眼看出是 dev 占位）。
  #
  # 生产 / staging：**必须** 通过环境变量 `CAT_AUTH_TOKEN_SECRET` 覆盖
  # （loader.go 已挂 env 优先级；部署 / K8s Secret 注入，避免把密钥写进
  # ConfigMap / 仓库）。
  #
  # 自定义 dev secret：`export CAT_AUTH_TOKEN_SECRET="<your-secret>"` 即可覆盖本默认。
  #
  # 故意改成空串 / 非法值（< 16 字节）→ 启动时 auth.New 返 error → main.go fail-fast（os.Exit 1）。
  token_secret: "local-dev-secret-do-not-use-in-prod-32bytes"
  token_expire_sec: 604800  # 7 天，epics.md §Story 4.4 行 1014 钦定

log:
  level: info
