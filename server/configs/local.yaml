server:
  # 本地开发默认绑 loopback：Windows Defender Firewall 对 127.0.0.1 免检，
  # 避免每次重编译 exe（新哈希）都弹一次"专用网络访问"授权窗。
  # 生产部署删掉此行（或改 0.0.0.0）让 server 监听所有网卡。
  bind_host: 127.0.0.1
  http_port: 8080
  read_timeout_sec: 5
  write_timeout_sec: 10

mysql:
  # 本地 MySQL 连接串（Story 4.2 接入，ADR-0003 选型）。
  # 生产 / staging 通过环境变量 `CAT_MYSQL_DSN` 覆盖（loader.go 已挂 env 优先级；
  # 部署 / K8s Secret 注入 DSN，避免把密码写进 ConfigMap / 仓库）。
  # 字段说明详见 _bmad-output/implementation-artifacts/decisions/0003-orm-stack.md §"DSN 配置策略"。
  dsn: "cat:catdev@tcp(127.0.0.1:3306)/cat?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_sec: 1800

auth:
  # JWT signing secret（HS256；Story 4.4 接入）。
  #
  # === 故意留空 —— 启动前必须 export CAT_AUTH_TOKEN_SECRET 覆盖 ===
  # 这里**不**放 dev fallback secret。原因（round 3 codex review [P1] 拦下的反向纠偏）：
  #
  #   - `LocateDefault()` 和 README 都把这个 yaml 路径作为推荐启动入口；
  #   - 任何 staging / prod 环境只要误用此 yaml + 漏注入 `CAT_AUTH_TOKEN_SECRET`
  #     env，server 就会用**公开仓库已知**的 secret 启动，任何看过 repo 的人都
  #     可以伪造 HS256 token 绕过 auth；
  #   - 留空（""）反而**更安全**：auth.New("") → error → main.go fail-fast
  #     (os.Exit 1)，misconfiguration 永远上不了线，避免"工作但 insecure"路径。
  #
  # 关键 trade-off：fresh clone "1 步上手" vs "安全默认" → 选**安全**（fail-fast）
  # + 让 README 引导 onboarding 流程：
  #   1) clone repo + 跑 ./build/catserver → 立刻 exit 1，slog.Error 提示
  #      "auth: secret is empty (set CAT_AUTH_TOKEN_SECRET or auth.token_secret)"
  #   2) 读 README "快速启动" → 看到 "必须 export CAT_AUTH_TOKEN_SECRET"
  #   3) export 后重跑 → 成功
  #
  # 本地 dev 启动（任选其一）：
  #
  #   export CAT_AUTH_TOKEN_SECRET="$(openssl rand -hex 32)"   # 随机
  #   export CAT_AUTH_TOKEN_SECRET="my-local-dev-secret-32-bytes-min"  # 固定值（重启后 token 不失效）
  #
  # 生产 / staging：通过部署侧 K8s Secret / Vault 注入 `CAT_AUTH_TOKEN_SECRET`，
  # 避免把密钥写进 ConfigMap / 仓库。
  #
  # 这个空串**不是**疏漏；任何尝试在这里填 fallback 值的 PR 必须先看
  # docs/lessons/2026-04-26-checked-in-secret-must-fail-fast.md 再说。
  token_secret: ""
  token_expire_sec: 604800  # 7 天，epics.md §Story 4.4 行 1014 钦定

ratelimit:
  # 每 key（IP 或 userID）每分钟允许的请求数。Story 4.5 引入；
  # epics.md §Story 4.5 行 1039 + V1 §4.1 行 218 钦定默认 60。
  # 节点 2 阶段不对外发布，60 完全够用。生产 launch 阶段（Epic 36）按需调整。
  per_key_per_min: 60
  # token bucket 容量（瞬时突发上限）。默认 = per_key_per_min（让一次 burst 60 次也能过）。
  burst_size: 60
  # 内存 bucket 数上限（防 IP 洪泛 OOM）。约 1MB 内存；节点 10+ 切 Redis 后此项废弃。
  buckets_limit: 10000

log:
  level: info
