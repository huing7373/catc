server:
  # 本地开发默认绑 loopback：Windows Defender Firewall 对 127.0.0.1 免检，
  # 避免每次重编译 exe（新哈希）都弹一次"专用网络访问"授权窗。
  # 生产部署删掉此行（或改 0.0.0.0）让 server 监听所有网卡。
  bind_host: 127.0.0.1
  http_port: 8080
  read_timeout_sec: 5
  write_timeout_sec: 10

mysql:
  # 本地 MySQL 连接串（Story 4.2 接入，ADR-0003 选型）。
  # 生产 / staging 通过环境变量 `CAT_MYSQL_DSN` 覆盖（loader.go 已挂 env 优先级；
  # 部署 / K8s Secret 注入 DSN，避免把密码写进 ConfigMap / 仓库）。
  # 字段说明详见 _bmad-output/implementation-artifacts/decisions/0003-orm-stack.md §"DSN 配置策略"。
  dsn: "cat:catdev@tcp(127.0.0.1:3306)/cat?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_sec: 1800

auth:
  # JWT signing secret（HS256；Story 4.4 接入）。
  # 本地开发：用 export CAT_AUTH_TOKEN_SECRET="<≥16 字节随机字符串>" 注入，
  # 或在本文件填 token_secret（不推荐，避免 secret 入仓）。
  # 生产 / staging：通过环境变量 `CAT_AUTH_TOKEN_SECRET` 覆盖（loader.go 已挂；
  # 部署 / K8s Secret 注入，避免把密钥写进 ConfigMap / 仓库）。
  # 留空 → 启动时 auth.New 返 error → main.go fail-fast（os.Exit 1）。
  token_secret: ""
  token_expire_sec: 604800  # 7 天，epics.md §Story 4.4 行 1014 钦定

log:
  level: info
