# Local development configuration. Not committed with real secrets in
# production environments — every developer's machine overrides its own
# copy.

[server]
port = 8080
mode = "debug"
cors_allowed_origins = ["http://localhost:3000"]
shutdown_timeout_sec = 10

[log]
level = "debug"
format = "console"

[mongo]
uri = "mongodb://cat:cat_dev_password@localhost:27017/?authSource=admin"
database = "cat"
timeout_sec = 5

[redis]
addr = "localhost:6379"
password = "cat_redis_dev"
db = 0

[jwt]
access_secret = "local-dev-access-secret-change-me"
refresh_secret = "local-dev-refresh-secret-change-me"
access_ttl_min = 60
refresh_ttl_day = 30
issuer = "cat-backend-local"

[apns]
key_id = ""
team_id = ""
bundle_id = "com.example.cat.dev"
key_path = ""

[cdn]
base_url = "http://localhost:9000/cat-dev"
upload_key = ""
