# Default configuration values. local.toml and production.toml may
# override any of these fields. Sensitive values (JWT secrets, API keys)
# are expected to come from environment variables at runtime, not from
# this file.

[server]
port = 8080
mode = "release"
cors_allowed_origins = []
shutdown_timeout_sec = 30

[log]
level = "info"
format = "json"

[mongo]
uri = "mongodb://localhost:27017"
database = "cat"
timeout_sec = 5

[redis]
addr = "localhost:6379"
password = ""
db = 0

[jwt]
access_secret = ""
refresh_secret = ""
access_ttl_min = 60
refresh_ttl_day = 30
issuer = "cat-backend"

[apns]
key_id = ""
team_id = ""
bundle_id = "com.example.cat"
key_path = ""

[cdn]
base_url = ""
upload_key = ""
