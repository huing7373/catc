[server]
host = ""
port = 0
tls = false
mode = "release"

[log]
level = ""
format = "json"
output = ""

[mongo]
uri = ""
db = ""
timeout_sec = 10

[redis]
addr = ""
db = 0

[jwt]
private_key_path = ""
private_key_path_old = ""
active_kid = ""
old_kid = ""
issuer = ""
access_expiry_sec = 900
refresh_expiry_sec = 2592000

[ws]
max_connections = 10000
ping_interval_sec = 30
pong_timeout_sec = 60
send_buf_size = 256
dedup_ttl_sec = 300
connect_rate_per_window = 5
connect_rate_window_sec = 60
blacklist_default_ttl_sec = 86400
resume_cache_ttl_sec = 60

[apns]
key_id = ""
team_id = ""
bundle_id = ""
key_path = ""
watch_topic = ""
iphone_topic = ""
stream_key = "apns:queue"
dlq_key = "apns:dlq"
retry_zset_key = "apns:retry"
consumer_group = "apns_workers"
worker_count = 2
idem_ttl_sec = 300
read_block_ms = 1000
read_count = 10
retry_backoffs_ms = [1000, 3000, 9000]
max_attempts = 4
token_expiry_days = 30
enabled = false
# Story 1.4 — AES-256 at-rest encryption key (64 hex chars = 32 bytes).
# REQUIRED in release mode regardless of `enabled` (staging may persist
# tokens without pushing). Debug / test deployments fall back to a
# dev-only zero key; release boot fails fast if this stays empty.
token_encryption_key_hex = ""
register_rate_per_window = 5
register_rate_window_sec = 60

[apple]
bundle_id = ""
jwks_url = "https://appleid.apple.com/auth/keys"
jwks_cache_key = "apple_jwk:cache"
jwks_cache_ttl_sec = 86400
jwks_fetch_timeout_sec = 5

[cdn]
base_url = ""
