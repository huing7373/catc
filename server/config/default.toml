# Default configuration values. local.toml and production.toml may
# override any of these fields. Sensitive values (JWT secrets, API keys)
# are expected to come from environment variables at runtime, not from
# this file.

[server]
port = 8080
mode = "release"
cors_allowed_origins = []
shutdown_timeout_sec = 30

[log]
level = "info"
format = "json"

[mongo]
uri = "mongodb://localhost:27017"
database = "cat"
timeout_sec = 5

[redis]
addr = "localhost:6379"
password = ""
db = 0

[jwt]
access_secret = ""
refresh_secret = ""
# Previous-secret slots are populated only during a 24h key-rotation
# window; leave empty in steady state.
access_secret_previous = ""
refresh_secret_previous = ""
# 7 days. Watch users can stay logged in across a typical week even if
# they never open the iPhone companion app.
access_ttl_min = 10080
refresh_ttl_day = 30
issuer = "cat-backend"

[apns]
key_id = ""
team_id = ""
bundle_id = "com.zhuming.cat.phone"
key_path = ""

[apple]
# Sign in with Apple identity-token verification. allowed_audiences must
# include every iOS / watchOS bundle id we ship; if left empty the loader
# falls back to [apns].bundle_id.
jwks_url = "https://appleid.apple.com/auth/keys"
jwks_cache_ttl_min = 60
allowed_audiences = ["com.zhuming.cat.phone"]

[cdn]
base_url = ""
upload_key = ""
